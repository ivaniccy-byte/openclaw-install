name: Build Windows Installer

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache Node.js Runtime
        id: cache-node-runtime
        uses: actions/cache@v4
        with:
          path: node-v22.12.0-win-x64.zip
          key: node-runtime-22.12.0

      - name: Download Node.js Runtime
        if: steps.cache-node-runtime.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v22.12.0/node-v22.12.0-win-x64.zip" -OutFile "node-v22.12.0-win-x64.zip"

      - name: Extract Node.js Runtime
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/node-runtime"
          Expand-Archive -Path "node-v22.12.0-win-x64.zip" -DestinationPath "src-tauri/resources/node-runtime/tmp" -Force
          Copy-Item -Path "src-tauri/resources/node-runtime/tmp/node-v22.12.0-win-x64/*" -Destination "src-tauri/resources/node-runtime" -Recurse -Force
          Remove-Item -Path "src-tauri/resources/node-runtime/tmp" -Recurse -Force

      - name: Download Python 3.10 Embeddable
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/python-runtime"
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip" -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath "src-tauri/resources/python-runtime" -Force
          Remove-Item "python-embed.zip"

      - name: Install Professional OpenClaw Core & Dependencies
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/openclaw"
          Push-Location src-tauri/resources/openclaw
          npm init -y
          npm install openclaw@2026.3.28 --save
          # Compress node_modules to avoid too many files for Tauri bundler and match extra.nsh expectation
          tar -czf node_modules.tar.gz node_modules
          Remove-Item -Path node_modules -Recurse -Force
          Set-Content -Path "start.js" -Value "require('./node_modules/openclaw/bin/openclaw.js');"
          Pop-Location

      - name: Download Professional Skills & Memory Systems
        run: |
          Write-Host ">>> Initializing Directories"
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/skills", "src-tauri/resources/memories"

          Write-Host ">>> Downloading & Extracting OpenClaw Skills"
          Invoke-WebRequest -Uri "https://github.com/openclaw/skills/archive/refs/heads/main.zip" -OutFile "skills.zip"

          # Clean and extract using tar (built-in on Windows runner, handles dot-files correctly)
          cmd /c "rmdir /s /q src-tauri\resources\skills_tmp 2>nul || exit 0"
          tar -xf skills.zip -C src-tauri/resources
          Write-Host "Skills extracted to:"
          Get-ChildItem -Path "src-tauri/resources" -Directory | ForEach-Object { Write-Host "  $($_.Name)" }

          # Find the extracted root directory (skills-main from the zip)
          $skillsRoot = Join-Path "src-tauri/resources" "skills-main"
          if (-not (Test-Path $skillsRoot)) {
              Write-Error "Failed to find skills-main directory"
              exit 1
          }
          Write-Host "Skills root: $skillsRoot"

          $skillsToInclude = @("tavily-search", "multi-search-engine", "word-document-processor", "excel-automation")
          foreach ($skill in $skillsToInclude) {
              $src = Join-Path $skillsRoot $skill
              if (Test-Path $src) {
                  Write-Host "Copying Skill: $skill"
                  Copy-Item -Path $src -Destination "src-tauri/resources/skills" -Recurse -Force
              } else {
                  Write-Warning "Skill not found: $skill (expected at: $src)"
              }
          }

      - name: Download & Bundle OpenClaw Skills (Hardened)
        run: |
          $losslessRoot = "lossless-claw-enhanced"
          $humanizerRoot = "humanizer"

          # 1. Download Lossless Memory Enhanced
          Invoke-WebRequest -Uri "https://github.com/win4r/lossless-claw-enhanced/archive/refs/heads/main.zip" -OutFile "lossless.zip"
          Expand-Archive -Path "lossless.zip" -DestinationPath "lossless-tmp" -Force
          Move-Item -Path "lossless-tmp/lossless-claw-enhanced-main" -Destination "src-tauri/resources/lossless-claw-enhanced" -Force

          # 2. Setup Memories folder for bundling
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/memories/lossless"
          Copy-Item -Path "src-tauri/resources/lossless-claw-enhanced/*" -Destination "src-tauri/resources/memories/lossless" -Recurse -Force

          # 3. Setup Humanizer Skill
          Invoke-WebRequest -Uri "https://github.com/brandonwise/humanizer/archive/refs/heads/main.zip" -OutFile "humanizer.zip"
          Expand-Archive -Path "humanizer.zip" -DestinationPath "humanizer-tmp" -Force
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/skills/humanizer"
          Move-Item -Path "humanizer-tmp/humanizer-main/*" -Destination "src-tauri/resources/skills/humanizer" -Force

          # 4. Add other community skills (example structure)
          # We can add more here later, but ensure they all have subdirectories
          New-Item -ItemType File -Force -Path "src-tauri/resources/skills/.gitkeep"

          # 5. Generate CLI Shim (openclaw.cmd)
          Write-Host ">>> Generating CLI Shim..."
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/bin"
          $shimContent = "@echo off`nsetlocal`nset `"RESOURCES_DIR=%~dp0..`"`nset `"NODE_EXE=%RESOURCES_DIR%\node-runtime\node.exe`"`nset `"OPENCLAW_JS=%RESOURCES_DIR%\openclaw\start.js`"`nif not exist `"%NODE_EXE%`" ( echo [Error] Node.js runtime not found & exit /b 1 )`nif not exist `"%OPENCLAW_JS%`" ( echo [Error] OpenClaw core script not found & exit /b 1 )`n`"%NODE_EXE%`" `"%OPENCLAW_JS%`" %*`nendlocal"
          Set-Content -Path "src-tauri/resources/bin/openclaw.cmd" -Value $shimContent

      - name: Pre-build Resource Sanity Check
        run: |
          Write-Host ">>> Validating bundled resources..."
          $paths = @(
            "src-tauri/resources/node-runtime/node.exe",
            "src-tauri/resources/python-runtime/python.exe",
            "src-tauri/resources/openclaw/start.js",
            "src-tauri/resources/openclaw/node_modules.tar.gz",
            "src-tauri/resources/bin/openclaw.cmd"
          )

          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "[OK] $p exists."
            } else {
              Write-Error "[FATAL] $p is MISSING! Build aborted."
              exit 1
            }
          }

          Write-Host ">>> Skills bundled:"
          Get-ChildItem -Path "src-tauri/resources/skills"

      - name: Cleanup and Finalizing
        run: |
          $dirsToCleanup = @(
              "src-tauri/resources/skills-main",
              "src-tauri/resources/memories/lossless-claw-enhanced-main",
              "src-tauri/resources/humanizer-main"
          )
          $filesToCleanup = @("skills.zip", "lossless.zip", "humanizer.zip")

          foreach ($dir in $dirsToCleanup) {
              if (Test-Path $dir) {
                  cmd /c "rmdir /s /q $dir 2>nul || exit 0"
                  Write-Host "Cleaned up: $dir"
              }
          }
          foreach ($file in $filesToCleanup) {
              if (Test-Path $file) {
                  Remove-Item $file -Force
                  Write-Host "Cleaned up: $file"
              }
          }
          Write-Host ">>> Cleanup Complete"







      - name: Disk Cleanup
        run: |
          Write-Host ">>> Checking Disk Space before build"
          Get-PSDrive C
          Write-Host ">>> Cleaning up unnecessary files"
          # Clear npm cache and temp files to free up space for the heavy Tauri build
          npm cache clean --force
          Remove-Item -Path "node_modules" -Recurse -Force
          npm ci
          
      - name: Build Tauri app
        run: npm run tauri build -- --verbose
        timeout-minutes: 60
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG: true
          TAURI_BUILD_DEBUG: 1
          TAURI_CLI_DEBUG: true
          RUST_BACKTRACE: full
          CARGO_LOG: tauri_build=info

      - name: Debug resources size
        if: failure()
        run: |
          Write-Host "=== Resources file count ==="
          $count = (Get-ChildItem -Path "src-tauri/resources" -Recurse -File -ErrorAction SilentlyContinue | Measure-Object).Count
          Write-Host "Total files in resources: $count"
          Write-Host "=== Top-level directories ==="
          Get-ChildItem -Path "src-tauri/resources" -Directory | ForEach-Object {
              $subCount = (Get-ChildItem -Path $_.FullName -Recurse -File -ErrorAction SilentlyContinue | Measure-Object).Count
              Write-Host "  $($_.Name): $subCount files"
          }

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize Resources Structure
        run: |
          mkdir -p src-tauri/resources/node-runtime
          mkdir -p src-tauri/resources/python-runtime
          mkdir -p src-tauri/resources/openclaw
          mkdir -p src-tauri/resources/skills
          mkdir -p src-tauri/resources/memories
          mkdir -p src-tauri/resources/bin
          touch src-tauri/resources/node-runtime/.gitkeep
          touch src-tauri/resources/python-runtime/.gitkeep
          touch src-tauri/resources/skills/.gitkeep
          touch src-tauri/resources/memories/.gitkeep
          touch src-tauri/resources/bin/.gitkeep
          touch src-tauri/resources/openclaw/start.js
          echo "Placeholder for CI" > src-tauri/resources/openclaw/placeholder.tar.gz

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Node
        run: node --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-macos-installer
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn
