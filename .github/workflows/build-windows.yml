name: Build Windows Installer

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache Node.js Runtime
        id: cache-node-runtime
        uses: actions/cache@v4
        with:
          path: node-v22.12.0-win-x64.zip
          key: node-runtime-22.12.0

      - name: Download Node.js Runtime
        if: steps.cache-node-runtime.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v22.12.0/node-v22.12.0-win-x64.zip" -OutFile "node-v22.12.0-win-x64.zip"

      - name: Extract Node.js Runtime
        run: |
          New-Item -ItemType Directory -Force -Path "resources/node-runtime"
          Expand-Archive -Path "node-v22.12.0-win-x64.zip" -DestinationPath "resources/node-runtime/tmp" -Force
          Copy-Item -Path "resources/node-runtime/tmp/node-v22.12.0-win-x64/*" -Destination "resources/node-runtime" -Recurse -Force
          Remove-Item -Path "resources/node-runtime/tmp" -Recurse -Force

      - name: Download Python 3.10 Embeddable
        run: |
          New-Item -ItemType Directory -Force -Path "resources/python-runtime"
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip" -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath "resources/python-runtime" -Force
          Remove-Item "python-embed.zip"

      - name: Install Professional OpenClaw Core & Dependencies
        run: |
          New-Item -ItemType Directory -Force -Path "resources/openclaw"
          Push-Location resources/openclaw
          npm init -y
          npm install openclaw@2026.3.28 --save
          Set-Content -Path "start.js" -Value "require('./node_modules/openclaw/bin/openclaw.js');"
          Pop-Location

      - name: Download Professional Skills & Memory Systems
        run: |
          New-Item -ItemType Directory -Force -Path "resources/skills"
          New-Item -ItemType Directory -Force -Path "resources/memories"
          
          # OpenClaw Skills
          Invoke-WebRequest -Uri "https://github.com/openclaw/skills/archive/refs/heads/main.zip" -OutFile "skills.zip"
          Expand-Archive -Path "skills.zip" -DestinationPath "resources/skills_tmp" -Force
          
          $skillsToInclude = @("tavily-search", "multi-search-engine", "word-document-processor", "excel-automation")
          Get-ChildItem -Path "resources/skills_tmp/*" -Directory | ForEach-Object {
              $root = $_.FullName
              foreach ($skill in $skillsToInclude) {
                  $skillPath = Join-Path $root $skill
                  if (Test-Path $skillPath) { Copy-Item -Path "$skillPath" -Destination "resources/skills" -Recurse -Force }
              }
          }
          
          # Memory: Lossless Claw Enhanced
          Invoke-WebRequest -Uri "https://github.com/win4r/lossless-claw-enhanced/archive/refs/heads/main.zip" -OutFile "lossless.zip"
          Expand-Archive -Path "lossless.zip" -DestinationPath "resources/memories/lossless_tmp" -Force
          Move-Item -Path "resources/memories/lossless_tmp/*/*" -Destination "resources/memories/lossless" -Force
          Remove-Item "resources/memories/lossless_tmp" -Recurse -Force
          
          # Skill: Humanizer
          Invoke-WebRequest -Uri "https://github.com/brandonwise/humanizer/archive/refs/heads/main.zip" -OutFile "humanizer.zip"
          Expand-Archive -Path "humanizer.zip" -DestinationPath "resources/humanizer_tmp" -Force
          Get-ChildItem -Path "resources/humanizer_tmp/*" -Directory | ForEach-Object {
              Copy-Item -Path "$($_.FullName)" -Destination "resources/skills/humanizer" -Recurse -Force
          }

          # Cleanup
          Remove-Item -Path "resources/skills_tmp" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "resources/humanizer_tmp" -Recurse -Force -ErrorAction SilentlyContinue
          @("skills.zip", "lossless.zip", "humanizer.zip") | ForEach-Object { if (Test-Path $_) { Remove-Item $_ -Force } }







      - name: Build Tauri app
        run: npm run tauri build
        timeout-minutes: 60
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Node
        run: node --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-macos-installer
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn
