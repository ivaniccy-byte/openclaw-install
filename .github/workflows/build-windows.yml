name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache Node.js Runtime
        id: cache-node-runtime
        uses: actions/cache@v4
        with:
          path: node-v22.12.0-win-x64.zip
          key: node-runtime-22.12.0

      - name: Download Node.js Runtime
        if: steps.cache-node-runtime.outputs.cache-hit != 'true'
        run: |
          $nodeVersion = "22.12.0"
          $nodeUrl = "https://nodejs.org/dist/v$nodeVersion/node-v$nodeVersion-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile "node-v22.12.0-win-x64.zip"

      - name: Extract Node.js Runtime
        run: |
          mkdir -p resources/node-runtime/win-x64
          Expand-Archive -Path "node-v22.12.0-win-x64.zip" -DestinationPath "resources/node-runtime/tmp" -Force
          Move-Item -Path "resources/node-runtime/tmp/node-v22.12.0-win-x64/*" -Destination "resources/node-runtime/win-x64" -Force
          Remove-Item -Path "resources/node-runtime/tmp" -Recurse -Force

      - name: Cache Tauri bundler tools
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\tauri\NSIS
            ~\AppData\Local\tauri\WixTools
          key: ${{ runner.os }}-tauri-tools-${{ hashFiles('src-tauri/tauri.conf.json') }}
          restore-keys: |
            ${{ runner.os }}-tauri-tools-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Download and Extract OpenClaw 3.28
        run: |
          # Fix: Included 'v' prefix in tag name
          Invoke-WebRequest -Uri "https://github.com/openclaw/openclaw/archive/refs/tags/v2026.3.28.zip" -OutFile "openclaw.zip"
          Expand-Archive -Path "openclaw.zip" -DestinationPath "resources/openclaw_tmp" -Force
          # Ensure target exists
          New-Item -ItemType Directory -Force -Path resources/openclaw | Out-Null
          # Folder name in zip is polymorphic (v-prefix or not), using wildcard
          Copy-Item -Path "resources/openclaw_tmp/*/*" -Destination "resources/openclaw" -Recurse -Force
          if (Test-Path "resources/openclaw_tmp") { cmd /c rmdir /s /q resources\openclaw_tmp }

      - name: Download and Extract Memory Systems
        run: |
          # Lossless Claw
          Invoke-WebRequest -Uri "https://github.com/Martian-Engineering/lossless-claw/archive/refs/tags/v0.6.2.zip" -OutFile "lossless-claw.zip"
          Expand-Archive -Path "lossless-claw.zip" -DestinationPath "resources/lossless_tmp" -Force
          New-Item -ItemType Directory -Force -Path resources/lossless-claw | Out-Null
          Copy-Item -Path "resources/lossless_tmp/lossless-claw-0.6.2/*" -Destination "resources/lossless-claw" -Recurse -Force
          
          # Memory LanceDB Pro (Mocking URL pattern for bundle)
          New-Item -ItemType Directory -Force -Path resources/lancedb-pro | Out-Null
          
          if (Test-Path "resources/lossless_tmp") { cmd /c rmdir /s /q resources\lossless_tmp }


      - name: Download and Extract Professional Skills
        run: |
          # 1. Prepare target directory
          New-Item -ItemType Directory -Force -Path resources/skills | Out-Null
          
          # 2. Download and Extract OpenClaw Skills
          Invoke-WebRequest -Uri "https://github.com/openclaw/skills/archive/refs/heads/main.zip" -OutFile "skills.zip"
          Expand-Archive -Path "skills.zip" -DestinationPath "resources/skills_tmp" -Force
          $skillsToInclude = @("tavily-search", "multi-search-engine", "brainstorming", "workflows", "coding-agent", "word-document-processor", "excel-automation", "ppt-visual")
          Get-ChildItem -Path "resources/skills_tmp/*" -Directory | ForEach-Object {
              $root = $_.FullName
              foreach ($skill in $skillsToInclude) {
                  $skillPath = Join-Path $root $skill
                  if (Test-Path $skillPath) {
                      Copy-Item -Path "$skillPath" -Destination "resources/skills" -Recurse -Force
                  }
              }
          }
          
          # 3. Download and Extract Humanizer
          Invoke-WebRequest -Uri "https://github.com/brandonwise/humanizer/archive/refs/heads/main.zip" -OutFile "humanizer.zip"
          Expand-Archive -Path "humanizer.zip" -DestinationPath "resources/humanizer_tmp" -Force
          Get-ChildItem -Path "resources/humanizer_tmp/*" -Directory | ForEach-Object {
              Copy-Item -Path "$($_.FullName)" -Destination "resources/skills/humanizer" -Recurse -Force
          }
          
          # 4. Cleanup
          if (Test-Path "resources/skills_tmp") { cmd /c rmdir /s /q resources\skills_tmp }
          if (Test-Path "resources/humanizer_tmp") { cmd /c rmdir /s /q resources\humanizer_tmp }
          Remove-Item -Path "openclaw.zip", "lossless-claw.zip", "skills.zip", "humanizer.zip" -ErrorAction SilentlyContinue
          Write-Host "Workplace resources integrated successfully."






      - name: Build Tauri app
        run: npm run tauri build
        timeout-minutes: 60
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js 22
        run: |
          brew install node@22

      - name: Verify Node
        run: node --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build
