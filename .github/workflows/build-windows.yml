name: Build Windows Installer

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache Node.js Runtime
        id: cache-node-runtime
        uses: actions/cache@v4
        with:
          path: node-v22.12.0-win-x64.zip
          key: node-runtime-22.12.0

      - name: Download Node.js Runtime
        if: steps.cache-node-runtime.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v22.12.0/node-v22.12.0-win-x64.zip" -OutFile "node-v22.12.0-win-x64.zip"

      - name: Extract Node.js Runtime
        run: |
          New-Item -ItemType Directory -Force -Path "resources/node-runtime"
          Expand-Archive -Path "node-v22.12.0-win-x64.zip" -DestinationPath "resources/node-runtime/tmp" -Force
          Copy-Item -Path "resources/node-runtime/tmp/node-v22.12.0-win-x64/*" -Destination "resources/node-runtime" -Recurse -Force
          Remove-Item -Path "resources/node-runtime/tmp" -Recurse -Force

      - name: Download Python 3.10 Embeddable
        run: |
          New-Item -ItemType Directory -Force -Path "resources/python-runtime"
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip" -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath "resources/python-runtime" -Force
          Remove-Item "python-embed.zip"

      - name: Install Professional OpenClaw Core & Dependencies
        run: |
          New-Item -ItemType Directory -Force -Path "resources/openclaw"
          Push-Location resources/openclaw
          npm init -y
          npm install openclaw@2026.3.28 --save
          Set-Content -Path "start.js" -Value "require('./node_modules/openclaw/bin/openclaw.js');"
          Pop-Location

      - name: Download Professional Skills & Memory Systems
        run: |
          Write-Host ">>> Initializing Directories"
          New-Item -ItemType Directory -Force -Path "resources/skills", "resources/memories"

          Write-Host ">>> Downloading & Extracting OpenClaw Skills"
          Invoke-WebRequest -Uri "https://github.com/openclaw/skills/archive/refs/heads/main.zip" -OutFile "skills.zip"

          # Use .NET ZipFile instead of Expand-Archive to avoid .github directory bug
          if (Test-Path "resources/skills_tmp") {
              Remove-Item "resources/skills_tmp" -Recurse -Force -ErrorAction Stop
          }
          New-Item -ItemType Directory -Force -Path "resources/skills_tmp" | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory(
              (Resolve-Path "skills.zip").Path,
              (Resolve-Path "resources/skills_tmp").Path
          )

          # Find the extracted root directory
          $skillsRoot = Get-ChildItem -Path "resources/skills_tmp" -Directory | Select-Object -First 1
          if (-not $skillsRoot) {
              Write-Error "Failed to find extracted skills directory"
              Write-Error "Contents of skills_tmp:"
              Get-ChildItem -Path "resources/skills_tmp" -Force | Format-List
              exit 1
          }
          Write-Host "Skills root: $($skillsRoot.FullName)"

          $skillsToInclude = @("tavily-search", "multi-search-engine", "word-document-processor", "excel-automation")
          foreach ($skill in $skillsToInclude) {
              $src = Join-Path $skillsRoot.FullName $skill
              if (Test-Path $src) {
                  Write-Host "Copying Skill: $skill"
                  Copy-Item -Path $src -Destination "resources/skills" -Recurse -Force
              } else {
                  Write-Warning "Skill not found: $skill (expected at: $src)"
              }
          }

          Write-Host ">>> Downloading & Extracting Lossless Memory"
          Invoke-WebRequest -Uri "https://github.com/win4r/lossless-claw-enhanced/archive/refs/heads/main.zip" -OutFile "lossless.zip"
          if (Test-Path "resources/memories/lossless_tmp") {
              Remove-Item "resources/memories/lossless_tmp" -Recurse -Force -ErrorAction Stop
          }
          New-Item -ItemType Directory -Force -Path "resources/memories/lossless_tmp" | Out-Null
          [System.IO.Compression.ZipFile]::ExtractToDirectory(
              (Resolve-Path "lossless.zip").Path,
              (Resolve-Path "resources/memories/lossless_tmp").Path
          )
          $losslessRoot = (Get-ChildItem -Path "resources/memories/lossless_tmp" -Directory | Select-Object -First 1).FullName
          if ($losslessRoot) {
            Write-Host "Moving Lossless from $losslessRoot"
            New-Item -ItemType Directory -Force -Path "resources/memories/lossless"
            Move-Item -Path "$losslessRoot/*" -Destination "resources/memories/lossless" -Force
          }

          Write-Host ">>> Downloading & Extracting Humanizer"
          Invoke-WebRequest -Uri "https://github.com/brandonwise/humanizer/archive/refs/heads/main.zip" -OutFile "humanizer.zip"
          if (Test-Path "resources/humanizer_tmp") {
              Remove-Item "resources/humanizer_tmp" -Recurse -Force -ErrorAction Stop
          }
          New-Item -ItemType Directory -Force -Path "resources/humanizer_tmp" | Out-Null
          [System.IO.Compression.ZipFile]::ExtractToDirectory(
              (Resolve-Path "humanizer.zip").Path,
              (Resolve-Path "resources/humanizer_tmp").Path
          )
          $humanizerRoot = (Get-ChildItem -Path "resources/humanizer_tmp" -Directory | Select-Object -First 1).FullName
          if ($humanizerRoot) {
            Write-Host "Copying Humanizer from $humanizerRoot"
            New-Item -ItemType Directory -Force -Path "resources/skills/humanizer"
            Copy-Item -Path "$humanizerRoot/*" -Destination "resources/skills/humanizer" -Recurse -Force
          }

          Write-Host ">>> Cleanup and Finalizing"
          $toCleanup = @("resources/skills_tmp", "resources/humanizer_tmp", "resources/memories/lossless_tmp")
          $filesToCleanup = @("skills.zip", "lossless.zip", "humanizer.zip")

          foreach ($dir in $toCleanup) {
              if (Test-Path $dir) {
                  Try {
                      Write-Host "Cleaning up directory: $dir"
                      # Use -ErrorAction Stop with proper exception handling for robust cleanup
                      Get-ChildItem -Path $dir -Recurse | Remove-Item -Force -Recurse -ErrorAction SilentlyContinue
                      Remove-Item -Path $dir -Force -Recurse -ErrorAction SilentlyContinue
                  } Catch {
                      Write-Warning "Failed to delete $dir`: $_"
                  }
              } else {
                  Write-Host "Directory $dir does not exist, skipping cleanup."
              }
          }
          foreach ($file in $filesToCleanup) {
              if (Test-Path $file) { 
                  Write-Host "Cleaning up file: $file"
                  Remove-Item $file -Force -ErrorAction SilentlyContinue 
              }
          }
          Write-Host ">>> Cleanup Complete"







      - name: Build Tauri app
        run: npm run tauri build
        timeout-minutes: 60
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Node
        run: node --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-macos-installer
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn
